<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Polymarket Bot</title>
<style>
  :root {
    --bg: #0a0e14; --surface: #10151d; --surface-2: #151c27;
    --border: #1a2332; --border-hover: #263344;
    --text: #b0bfd0; --text-dim: #556680; --text-bright: #e4ecf5;
    --green: #34d399; --green-dim: rgba(52,211,153,0.10);
    --red: #f87171; --red-dim: rgba(248,113,113,0.10);
    --blue: #60a5fa; --blue-dim: rgba(96,165,250,0.10);
    --amber: #fbbf24; --amber-dim: rgba(251,191,36,0.10);
    --purple: #a78bfa; --purple-dim: rgba(167,139,250,0.10);
    --orange: #fb923c;
    --cyan: #22d3ee;
    --radius: 14px; --radius-sm: 8px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    padding: 20px; -webkit-font-smoothing: antialiased;
    min-height: 100vh; max-width: 800px; margin: 0 auto;
  }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0 20px;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, #a78bfa 0%, #22d3ee 100%);
    display: grid; place-items: center;
    font-size: 16px; font-weight: 800; color: #fff;
  }
  .header h1 { font-size: 1.1em; font-weight: 700; color: var(--text-bright); }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--green);
    animation: blink 2.5s ease-in-out infinite;
  }
  .status-dot.error { background: var(--red); animation: none; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
  .hero { text-align: center; padding: 16px 0 24px; }
  .hero-label { font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); margin-bottom: 4px; }
  .hero-value { font-size: 2.8em; font-weight: 800; color: var(--text-bright); letter-spacing: -0.04em; }
  .hero-sub { display: flex; justify-content: center; gap: 20px; margin-top: 10px; font-size: 0.82em; flex-wrap: wrap; }
  .hero-sub span { color: var(--text-dim); }
  .pos { color: var(--green) !important; }
  .neg { color: var(--red) !important; }
  .section { margin-bottom: 20px; }
  .section-title { font-size: 0.68em; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
  .kv { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
  .kv + .kv { border-top: 1px solid var(--border); }
  .kv-label { color: var(--text-dim); font-size: 0.82em; }
  .kv-val { font-weight: 600; font-size: 0.85em; color: var(--text-bright); }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card { text-align: center; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 8px; }
  .stat-num { font-size: 1.6em; font-weight: 800; color: var(--text-bright); }
  .stat-label { font-size: 0.68em; color: var(--text-dim); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.05em; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 0.68em; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
  .badge-green { background: var(--green-dim); color: var(--green); }
  .badge-red { background: var(--red-dim); color: var(--red); }
  .badge-blue { background: var(--blue-dim); color: var(--blue); }
  .badge-amber { background: var(--amber-dim); color: var(--amber); }
  .badge-grey { background: rgba(120,120,120,0.15); color: #888; }
  .badge-purple { background: var(--purple-dim); color: var(--purple); }
  .pos-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 6px; font-size: 0.85em; }
  .pos-left { flex: 1; min-width: 0; }
  .pos-name { font-weight: 600; color: var(--text-bright); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pos-detail { font-size: 0.8em; color: var(--text-dim); margin-top: 2px; }
  .pos-right { text-align: right; margin-left: 12px; }
  .pos-value { font-weight: 700; font-size: 0.95em; }
  .ai-card { padding: 14px 16px; }
  .ai-card.ok { border-color: rgba(52,211,153,0.25); }
  .ai-card.warning { border-color: rgba(251,191,36,0.3); background: var(--amber-dim); }
  .ai-card.critical { border-color: rgba(248,113,113,0.3); background: var(--red-dim); }
  .ai-summary { font-size: 0.82em; color: var(--text); line-height: 1.5; margin-top: 6px; }
  .ai-time { font-size: 0.7em; color: var(--text-dim); margin-top: 4px; }
  .capital-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .cap-card { text-align: center; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 8px; }
  .cap-card.liquid { border-color: rgba(52,211,153,0.2); }
  .cap-card.locked { border-color: rgba(251,191,36,0.2); }
  .cap-card.btc    { border-color: rgba(251,146,60,0.2); }
  .cap-num { font-size: 1.22em; font-weight: 800; color: var(--text-bright); }
  .cap-num.green { color: var(--green); }
  .cap-num.amber { color: var(--amber); }
  .cap-num.orange { color: #fb923c; }
  .cap-label { font-size: 0.65em; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-top: 3px; }
  .btc-price { font-size: 1.3em; font-weight: 700; color: #f7931a; text-align: center; margin: 10px 0; }
  .footer { padding: 14px 0 8px; font-size: 0.68em; color: var(--text-dim); text-align: center; }
  .empty { text-align: center; padding: 24px; color: var(--text-dim); font-size: 0.85em; }
  .pos-profit { font-size: 0.75em; color: var(--text-dim); }
  @media (max-width: 640px) { body { padding: 14px; } .hero-value { font-size: 2em; } .grid-3 { grid-template-columns: 1fr 1fr; } .capital-row { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>
<div class="header">
  <div class="header-left"><div class="logo">P</div><h1>Polymarket Bot</h1></div>
  <div style="display:flex;align-items:center;gap:8px">
    <div id="dot" class="status-dot"></div>
    <span class="badge badge-green">LIVE</span>
  </div>
</div>
<div id="app"><div class="empty">Connecting...</div></div>
<div class="footer" id="footer">--</div>
<script>
const API = window.location.origin;
let D = null;

function usd(n, dec) {
  dec = dec === undefined ? 2 : dec;
  return '$' + Number(n||0).toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec});
}
function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text !== undefined) e.textContent = text;
  return e;
}
function badge(label, cls) {
  return el('span', 'badge ' + cls, label);
}

async function refresh() {
  try {
    const r = await fetch(API + '/api/all-status');
    D = await r.json();
    render();
    document.getElementById('dot').className = 'status-dot';
  } catch(e) {
    document.getElementById('dot').className = 'status-dot error';
  }
  document.getElementById('footer').textContent = 'Updated ' + new Date().toLocaleTimeString();
}

function render() {
  if (!D) return;
  const sn  = D.sniper        || {};
  const walletUsdc = D.wallet_usdc || 0;
  const positions  = D.open_positions || [];

  const gtaPaid      = positions.reduce((s,p) => s + (p.size||0), 0);
  const gtaPotential = positions.reduce((s,p) => s + (p.tokens||0) * 0.90, 0);
  const liquidTotal  = walletUsdc + (sn.bankroll||0);
  const totalPort    = liquidTotal + gtaPaid;

  const pnl     = sn.pnl || 0;
  const elapsed = parseInt((sn.period_elapsed||'').replace('s','')) || 0;
  const pct     = Math.min(100, (elapsed / 900) * 100);
  const rem     = Math.max(0, 900 - elapsed);
  const remM    = Math.floor(rem / 60);
  const remS    = String(rem % 60).padStart(2,'0');
  const btcStr  = sn.btc ? usd(sn.btc, 0) : '--';

  const app = document.getElementById('app');
  app.textContent = '';

  // ── Hero ─────────────────────────────────────
  const hero = el('div', 'hero');
  hero.append(el('div', 'hero-label', 'Total Portfolio Value'));
  hero.append(el('div', 'hero-value', usd(totalPort)));
  const sub = el('div', 'hero-sub');
  const s1 = el('span'); s1.textContent = usd(liquidTotal) + ' liquid';
  const sep = el('span', 'text-dim', ' · ');
  const s2 = el('span'); s2.textContent = usd(gtaPaid) + ' locked → ' + usd(gtaPotential) + ' potential';
  sub.style.cssText = 'display:flex;justify-content:center;gap:6px;margin-top:8px;font-size:0.78em;color:var(--text-dim);flex-wrap:wrap';
  sub.append(s1, sep, s2);
  hero.append(sub);
  app.append(hero);

  // ── Capital row ───────────────────────────────
  const capRow = el('div', 'capital-row');
  function capCard(num, label, numCls, cardCls) {
    const card = el('div', 'cap-card ' + cardCls);
    card.append(el('div', 'cap-num ' + numCls, num));
    card.append(el('div', 'cap-label', label));
    return card;
  }
  capRow.append(
    capCard(usd(walletUsdc),  'Wallet USDC',   'green',  'liquid'),
    capCard(usd(gtaPaid),     'Locked in Markets', 'amber',  'locked'),
    capCard(btcStr,           'BTC Price',     'orange', 'btc')
  );
  app.append(capRow);

  // ── Momentum Sniper ───────────────────────────
  const snSection = el('div', 'section');
  snSection.append(el('div', 'section-title', 'Momentum Sniper — 6 Coins'));
  const snCard = el('div', 'card');

  function kvRow(label, valueNode) {
    const row = el('div', 'kv');
    row.append(el('span', 'kv-label', label));
    if (typeof valueNode === 'string') {
      row.append(el('span', 'kv-val', valueNode));
    } else {
      const v = el('span', 'kv-val'); v.append(valueNode); row.append(v);
    }
    return row;
  }

  const circuitStr = sn.circuit || 'ok';
  let snStatusBadge;
  if (circuitStr.startsWith('PAUSED')) {
    snStatusBadge = badge(circuitStr, 'badge-red');
  } else if (elapsed <= 90) {
    snStatusBadge = badge('Snipe Window (' + elapsed + 's)', 'badge-amber');
  } else {
    snStatusBadge = badge('Waiting for next period', 'badge-blue');
  }
  snCard.append(kvRow('Strategy', 'Buy momentum within first 90s · entry $0.52 · 6 coins'));
  snCard.append(kvRow('Status', snStatusBadge));

  const pnlSpan = el('span', pnl >= 0 ? 'pos' : 'neg', (pnl>=0?'+':'') + usd(pnl));
  const bkRow = el('span'); bkRow.textContent = usd(sn.bankroll) + '  ·  ' + (sn.wins||0) + 'W / ' + (sn.losses||0) + 'L  ·  P&L ';
  bkRow.append(pnlSpan);
  snCard.append(kvRow('Bankroll', bkRow));

  const periodRow = el('span');
  periodRow.textContent = elapsed <= 90
    ? ('⚡ SNIPE WINDOW — ' + elapsed + 's elapsed')
    : (remM + 'm ' + remS + 's until next window');
  snCard.append(kvRow('Period', periodRow));

  // Progress bar — highlights snipe window in green, rest in grey
  const progWrap = el('div'); progWrap.style.cssText = 'margin-top:10px;height:5px;border-radius:3px;background:var(--surface-2);overflow:hidden';
  const progFill = el('div');
  const barColor = elapsed <= 90 ? 'linear-gradient(90deg,var(--green),var(--cyan))' : 'linear-gradient(90deg,var(--blue),var(--cyan))';
  progFill.style.cssText = 'height:100%;width:' + pct + '%;background:' + barColor + ';border-radius:3px;transition:width 1s linear';
  progWrap.append(progFill);
  snCard.append(progWrap);
  snSection.append(snCard);
  app.append(snSection);

  // ── Recent sniper fires ───────────────────────
  const recentFires = (sn.recent_trades||[]).slice(-5);
  if (recentFires.length) {
    const fireSection = el('div', 'section');
    fireSection.append(el('div', 'section-title', 'Recent Snipe Orders'));
    for (const t of recentFires.slice().reverse()) {
      const item = el('div', 'pos-item');
      const left = el('div', 'pos-left');
      const coinLabel = (t.coin||'?').toUpperCase() + ' ' + (t.side||'');
      left.append(el('div', 'pos-name', coinLabel));
      left.append(el('div', 'pos-detail', 'move ' + (t.move||'?') + ' · size ' + usd(t.size||0) + (t.boost && t.boost!=='1x' ? ' (' + t.boost + ' cross-confirm)' : '')));
      item.append(left);
      item.append(t.status === 'cancelled' ? badge('Cancelled', 'badge-grey') : badge('Placed', 'badge-amber'));
      fireSection.append(item);
    }
    app.append(fireSection);
  }

  // ── Sniper resolved trades ────────────────────
  const resolved = (sn.recent_resolved||[]).slice(-8);
  if (resolved.length) {
    const tSection = el('div', 'section');
    tSection.append(el('div', 'section-title', 'Trade History'));
    for (const t of resolved.slice().reverse()) {
      const item = el('div', 'pos-item');
      const left = el('div', 'pos-left');
      const coinLabel = (t.coin||'?').toUpperCase() + ' ' + (t.side||'');
      left.append(el('div', 'pos-name', coinLabel));
      left.append(el('div', 'pos-detail', 'move ' + (t.move_pct||'?') + '%'));
      item.append(left);
      const right = el('div'); right.style.display = 'flex'; right.style.gap = '8px'; right.style.alignItems = 'center';
      const pnlEl = el('span', parseFloat(t.pnl||0)>=0?'pos':'neg', (parseFloat(t.pnl||0)>=0?'+':'') + usd(t.pnl));
      right.append(pnlEl, badge(t.status, t.status==='won'?'badge-green':'badge-red'));
      item.append(right);
      tSection.append(item);
    }
    app.append(tSection);
  }

  // ── Certainty Sniper ──────────────────────────
  const cs = D.certainty_sniper || {};
  if (cs.bankroll > 0 || (cs.recent_trades||[]).length) {
    const csSection = el('div', 'section');
    csSection.append(el('div', 'section-title', 'Certainty Sniper — Late-Period'));
    const csCard = el('div', 'card');

    let csStatusBadge;
    const csElapsed = parseInt(cs.period_elapsed||'0');
    if (csElapsed >= 720 && csElapsed <= 840)
      csStatusBadge = badge('Certainty Window (' + csElapsed + 's)', 'badge-amber');
    else if ((cs.circuit||'ok') !== 'ok')
      csStatusBadge = badge('Circuit Open — ' + cs.circuit, 'badge-red');
    else
      csStatusBadge = badge('Watching · next window at 12min', 'badge-blue');

    const csBkEl = el('span');
    const csTrades = (cs.wins||0) + (cs.losses||0);
    csBkEl.textContent = usd(cs.bankroll) + '  ·  ' + cs.wins + 'W/' + (cs.losses||0) + 'L  ·  P&L ' + (cs.pnl >= 0 ? '+' : '') + usd(cs.pnl||0) + '  ·  win ' + (cs.win_rate||'--');
    csCard.append(kvRow('Status', csStatusBadge));
    csCard.append(kvRow('Bankroll', csBkEl));
    csSection.append(csCard);
    app.append(csSection);

    const csRecentFires = (cs.recent_trades||[]).slice(-5);
    if (csRecentFires.length) {
      const csFireSection = el('div', 'section');
      csFireSection.append(el('div', 'section-title', 'Recent Certainty Orders'));
      for (const t of csRecentFires.slice().reverse()) {
        const item = el('div', 'pos-item');
        const left = el('div', 'pos-left');
        left.append(el('div', 'pos-name', (t.coin||'?').toUpperCase() + ' ' + (t.side||'')));
        left.append(el('div', 'pos-detail',
          'move ' + (t.move||'?') + ' · entry ' + usd(parseFloat(t.entry_price||0)) + ' · size ' + usd(parseFloat(t.size_usd||0))));
        item.append(left);
        item.append(t.status === 'cancelled' ? badge('Cancelled', 'badge-grey') : badge('Placed', 'badge-amber'));
        csFireSection.append(item);
      }
      app.append(csFireSection);
    }

    const csResolved = (cs.recent_resolved||[]).slice(-8);
    if (csResolved.length) {
      const csHistSection = el('div', 'section');
      csHistSection.append(el('div', 'section-title', 'Certainty Trade History'));
      for (const t of csResolved.slice().reverse()) {
        const won = t.won === 'True' || t.won === true;
        const item = el('div', 'pos-item');
        const left = el('div', 'pos-left');
        left.append(el('div', 'pos-name', (t.coin||'?').toUpperCase() + ' ' + (t.side||'')));
        left.append(el('div', 'pos-detail', 'pnl ' + (won ? '+' : '') + usd(parseFloat(t.pnl||0))));
        item.append(left);
        item.append(badge(won ? 'Won' : 'Lost', won ? 'badge-green' : 'badge-red'));
        csHistSection.append(item);
      }
      app.append(csHistSection);
    }
  }

  // ── Open Long-term Positions ──────────────────
  const ptSection = el('div', 'section');
  const ptTitle = el('div', 'section-title');
  ptTitle.append(document.createTextNode('Long-term Positions (' + positions.length + ')'));
  const resolveNote = el('span'); resolveNote.style.cssText = 'margin-left:auto;font-weight:400;color:var(--amber)';
  resolveNote.textContent = 'Resolves Jul 31 2026';
  ptTitle.append(resolveNote);
  ptSection.append(ptTitle);

  if (!positions.length) {
    ptSection.append(el('div', 'empty', 'No positions'));
  } else {
    for (const p of positions) {
      const payout = (p.tokens||0) * 0.90;
      const profit = payout - (p.size||0);
      const item = el('div', 'pos-item');
      const left = el('div', 'pos-left');
      left.append(el('div', 'pos-name', (p.question||'').substring(0,52)));
      left.append(el('div', 'pos-detail', 'NO @ ' + usd(p.price) + '  ·  paid ' + usd(p.size)));
      item.append(left);
      const right = el('div', 'pos-right');
      right.append(el('div', 'pos-value pos', usd(payout)));
      right.append(el('div', 'pos-profit', '+' + usd(profit) + ' profit'));
      item.append(right);
      ptSection.append(item);
    }
    const footer = el('div'); footer.style.cssText = 'display:flex;justify-content:space-between;padding:8px 14px 2px;font-size:0.75em;color:var(--text-dim)';
    const finvest = el('span'); finvest.textContent = 'Invested: '; const finvestV = el('strong'); finvestV.textContent = usd(gtaPaid); finvest.append(finvestV);
    const fpot    = el('span'); fpot.textContent = 'If all win: ';   const fpotV = el('strong', 'pos'); fpotV.textContent = usd(gtaPotential); fpot.append(fpotV);
    const fprofit = el('span'); fprofit.textContent = 'Profit: ';    const fprofitV = el('strong', 'pos'); fprofitV.textContent = '+' + usd(gtaPotential - gtaPaid); fprofit.append(fprofitV);
    footer.append(finvest, fpot, fprofit);
    ptSection.append(footer);
  }
  app.append(ptSection);
}

setInterval(refresh, 5000);
refresh();
</script>
</body>
</html>
