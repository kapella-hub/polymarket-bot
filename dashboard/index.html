<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Polymarket Arb v4</title>
<style>
  :root {
    --bg: #0a0e14; --surface: #10151d; --surface-2: #151c27;
    --border: #1a2332; --border-hover: #263344;
    --text: #b0bfd0; --text-dim: #556680; --text-bright: #e4ecf5;
    --green: #34d399; --green-dim: rgba(52,211,153,0.10);
    --red: #f87171; --red-dim: rgba(248,113,113,0.10);
    --blue: #60a5fa; --blue-dim: rgba(96,165,250,0.10);
    --amber: #fbbf24; --amber-dim: rgba(251,191,36,0.10);
    --purple: #a78bfa; --purple-dim: rgba(167,139,250,0.10);
    --cyan: #22d3ee; --cyan-dim: rgba(34,211,238,0.10);
    --radius: 14px; --radius-sm: 8px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    padding: 20px; -webkit-font-smoothing: antialiased;
    min-height: 100vh; max-width: 1080px; margin: 0 auto;
  }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0 24px;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, #a78bfa 0%, #22d3ee 100%);
    display: grid; place-items: center;
    font-size: 16px; font-weight: 800; color: #fff;
  }
  .header h1 { font-size: 1.15em; font-weight: 700; color: var(--text-bright); letter-spacing: -0.03em; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--green);
    animation: blink 2.5s ease-in-out infinite;
  }
  .status-dot.error { background: var(--red); animation: none; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
  .mode-pill {
    font-size: 0.62em; font-weight: 700; letter-spacing: 0.1em;
    padding: 4px 12px; border-radius: 20px; text-transform: uppercase;
  }
  .mode-live { background: var(--red-dim); color: var(--red); }
  .mode-shadow { background: var(--amber-dim); color: var(--amber); }
  .mode-paper { background: var(--blue-dim); color: var(--blue); }

  /* Hero */
  .hero { text-align: center; padding: 24px 0 32px; }
  .hero-label { font-size: 0.68em; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 6px; }
  .hero-value { font-size: 3em; font-weight: 800; color: var(--text-bright); letter-spacing: -0.04em; }
  .hero-sub { display: flex; justify-content: center; gap: 28px; margin-top: 14px; font-size: 0.85em; flex-wrap: wrap; }
  .hero-sub span { color: var(--text-dim); }
  .hero-sub strong { font-weight: 600; }
  .hero-sub .pos { color: var(--green); }
  .hero-sub .neg { color: var(--red); }

  .section-title {
    font-size: 0.68em; font-weight: 600; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 10px; padding-left: 2px;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px;
    transition: border-color 0.15s; margin-bottom: 14px;
  }
  .card:hover { border-color: var(--border-hover); }

  /* Grids */
  .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px; }

  .stat-card { text-align: center; padding: 16px 10px; }
  .stat-num { font-size: 1.6em; font-weight: 800; color: var(--text-bright); letter-spacing: -0.03em; }
  .stat-label { font-size: 0.68em; color: var(--text-dim); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* Prices bar */
  .prices-bar {
    display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px;
  }
  .price-chip {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; border-radius: var(--radius-sm);
    background: var(--surface); border: 1px solid var(--border);
    font-size: 0.9em; flex: 1; min-width: 160px;
  }
  .price-sym { font-weight: 700; color: var(--text-bright); font-size: 1.05em; }
  .price-val { color: var(--text); font-weight: 600; }

  /* Engine status */
  .engine-card { padding: 16px 20px; margin-bottom: 24px; }
  .engine-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; font-size: 0.85em; }
  .engine-tag {
    display: inline-block; padding: 3px 10px; border-radius: 6px;
    font-size: 0.72em; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
    background: var(--purple-dim); color: var(--purple);
  }
  .engine-stat { color: var(--text); }
  .engine-stat strong { color: var(--text-bright); font-weight: 700; }
  .period-bar-wrap { margin-top: 12px; }
  .period-label { font-size: 0.78em; color: var(--text-dim); margin-bottom: 6px; display: flex; justify-content: space-between; }
  .period-bar { height: 6px; border-radius: 3px; background: var(--surface-2); overflow: hidden; }
  .period-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--cyan), var(--purple)); transition: width 0.5s ease; }

  /* Trades */
  .pos-item {
    display: grid; grid-template-columns: auto 1fr auto;
    gap: 10px 14px; align-items: center;
    padding: 12px 18px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 8px;
  }
  .pos-item:hover { border-color: var(--border-hover); }
  .pos-icon {
    width: 38px; height: 38px; border-radius: 10px;
    display: grid; place-items: center;
    font-size: 0.7em; font-weight: 800; color: #fff;
  }
  .pos-mid { min-width: 0; }
  .pos-name { font-weight: 700; font-size: 0.88em; color: var(--text-bright); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pos-detail { font-size: 0.75em; color: var(--text-dim); margin-top: 2px; }
  .pos-right { text-align: right; }
  .pos-value { font-weight: 700; font-size: 0.92em; }
  .pos-sub { font-size: 0.75em; color: var(--text-dim); margin-top: 2px; }

  .side-pill {
    display: inline-block; padding: 3px 10px; border-radius: 6px;
    font-size: 0.7em; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
  }
  .side-won { background: var(--green-dim); color: var(--green); }
  .side-lost { background: var(--red-dim); color: var(--red); }
  .side-open { background: var(--blue-dim); color: var(--blue); }

  /* AI monitor */
  .ai-card { padding: 18px 20px; margin-bottom: 24px; }
  .ai-card.ai-ok { border-color: rgba(52,211,153,0.25); }
  .ai-card.ai-warning { border-color: rgba(251,191,36,0.3); background: var(--amber-dim); }
  .ai-card.ai-critical { border-color: rgba(248,113,113,0.3); background: var(--red-dim); }
  .ai-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .ai-badge {
    font-size: 0.65em; font-weight: 700; letter-spacing: 0.08em;
    padding: 3px 10px; border-radius: 12px; text-transform: uppercase;
  }
  .ai-ok .ai-badge { background: var(--green-dim); color: var(--green); }
  .ai-warning .ai-badge { background: var(--amber-dim); color: var(--amber); }
  .ai-critical .ai-badge { background: var(--red-dim); color: var(--red); }
  .ai-summary { font-size: 0.85em; color: var(--text); line-height: 1.6; }
  .ai-issues { font-size: 0.78em; color: var(--amber); margin-top: 8px; }
  .ai-time { font-size: 0.72em; color: var(--text-dim); margin-top: 8px; }

  .kill-banner {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; border-radius: var(--radius-sm);
    margin-bottom: 20px; font-size: 0.82em; font-weight: 600;
    background: var(--red-dim); color: var(--red); border: 1px solid rgba(248,113,113,0.2);
  }

  .footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0 8px; font-size: 0.68em; color: var(--text-dim);
  }

  .empty-state { text-align: center; padding: 32px; color: var(--text-dim); font-size: 0.85em; }

  @media (max-width: 640px) {
    body { padding: 14px; }
    .hero-value { font-size: 2.2em; }
    .grid-5 { grid-template-columns: repeat(2, 1fr); }
    .grid-5 .card:last-child { grid-column: span 2; }
    .prices-bar { flex-direction: column; }
    .price-chip { min-width: unset; }
    .engine-row { gap: 10px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">P</div>
    <h1>Polymarket Arb</h1>
  </div>
  <div class="header-right">
    <div id="dot" class="status-dot"></div>
    <div id="mode"></div>
  </div>
</div>

<div id="kill-banner"></div>
<div id="app"><div class="empty-state">Connecting...</div></div>

<div class="footer">
  <span id="updated">--</span>
  <span>Polymarket Latency Arb v4</span>
</div>

<script>
const API = window.location.origin;
let arbData = null;
let botData = null;
let aiData = null;

const usd = (n,d=2) => '$' + Number(n||0).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});

function parsePeriodRemaining(raw) {
  if (!raw) return { text: '--:--', pct: 0 };
  var str = String(raw);
  var totalSec = 0;
  if (str.indexOf(':') !== -1) {
    var parts = str.split(':');
    totalSec = (parseInt(parts[0]) || 0) * 60 + (parseInt(parts[1]) || 0);
  } else {
    totalSec = parseInt(str) || 0;
  }
  var elapsed = 900 - totalSec;
  var pct = Math.max(0, Math.min(100, (elapsed / 900) * 100));
  var mm = Math.floor(totalSec / 60);
  var ss = totalSec % 60;
  return { text: mm + ':' + String(ss).padStart(2, '0'), pct: pct.toFixed(1) };
}

var ASSET_COLORS = {
  BTC: '#f7931a', ETH: '#627eea', SOL: '#14f195',
  XRP: '#00aae4', DOGE: '#c2a633'
};

function escapeHtml(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

async function refresh() {
  try {
    var results = await Promise.allSettled([
      fetch(API+'/status').then(function(r){return r.json();}),
      fetch(API+'/api/crypto-arb').then(function(r){return r.json();}).catch(function(){return null;}),
      fetch(API+'/api/ai-monitor').then(function(r){return r.json();}).catch(function(){return null;})
    ]);
    botData = results[0].status==='fulfilled' ? results[0].value : botData;
    arbData = results[1].status==='fulfilled' ? results[1].value : arbData;
    aiData = results[2].status==='fulfilled' ? results[2].value : aiData;
    render();
    document.getElementById('dot').className = 'status-dot';
  } catch(e) {
    document.getElementById('dot').className = 'status-dot error';
  }
  document.getElementById('updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
}

function render() {
  var d = botData;
  if (!d) return;

  var m = d.mode || 'shadow';
  document.getElementById('mode').className = 'mode-pill mode-' + m;
  document.getElementById('mode').textContent = m;

  var kb = document.getElementById('kill-banner');
  if (d.kill_switch) {
    kb.textContent = '';
    var banner = document.createElement('div');
    banner.className = 'kill-banner';
    banner.textContent = 'KILL SWITCH ACTIVE -- Trading halted';
    kb.appendChild(banner);
  } else {
    kb.textContent = '';
  }

  var arb = arbData || {};
  var bankroll = arb.bankroll || '--';
  var totalPnl = arb.total_pnl || '$0.00';
  var totalPnlNum = arb.total_pnl_num || 0;
  var winRate = arb.win_rate || '--';
  var roi = arb.roi || '--';
  var totalTrades = arb.total_trades || 0;
  var won = arb.won || 0;
  var lost = arb.lost || 0;
  var openCount = arb.open || 0;
  var signals = arb.signals || 0;
  var skipRepriced = arb.skip_repriced || 0;
  var ticks = arb.ticks || 0;
  var version = arb.version || 'legacy';

  var pnlColor = totalPnlNum >= 0 ? 'var(--green)' : 'var(--red)';
  var roiColor = String(roi).charAt(0) === '+' ? 'var(--green)' : (String(roi).charAt(0) === '-' ? 'var(--red)' : 'var(--text-bright)');

  // Build DOM
  var app = document.getElementById('app');
  app.textContent = '';

  // Hero
  var hero = document.createElement('div');
  hero.className = 'hero';
  var heroLabel = document.createElement('div');
  heroLabel.className = 'hero-label';
  heroLabel.textContent = 'BANKROLL';
  hero.appendChild(heroLabel);
  var heroVal = document.createElement('div');
  heroVal.className = 'hero-value';
  heroVal.textContent = bankroll;
  hero.appendChild(heroVal);
  var heroSub = document.createElement('div');
  heroSub.className = 'hero-sub';
  var spans = [
    {label: 'P&L ', value: totalPnl, color: pnlColor},
    {label: 'ROI ', value: roi, color: roiColor},
    {label: 'Win Rate ', value: winRate, color: 'var(--text-bright)'}
  ];
  spans.forEach(function(s) {
    var sp = document.createElement('span');
    sp.textContent = s.label;
    var strong = document.createElement('strong');
    strong.textContent = s.value;
    strong.style.color = s.color;
    sp.appendChild(strong);
    heroSub.appendChild(sp);
  });
  hero.appendChild(heroSub);
  app.appendChild(hero);

  // Stats grid
  var grid = document.createElement('div');
  grid.className = 'grid-5';
  var statsData = [
    {num: totalPnl, label: 'P&L', color: pnlColor},
    {num: winRate, label: 'Win Rate', color: 'var(--text-bright)'},
    {num: String(totalTrades), label: 'Trades', color: 'var(--text-bright)'},
    {num: won + '/' + lost, label: 'Won / Lost', color: null},
    {num: String(openCount), label: 'Open', color: 'var(--blue)'}
  ];
  statsData.forEach(function(s) {
    var card = document.createElement('div');
    card.className = 'card stat-card';
    var num = document.createElement('div');
    num.className = 'stat-num';
    if (s.label === 'Won / Lost') {
      var wonSpan = document.createElement('span');
      wonSpan.style.color = 'var(--green)';
      wonSpan.textContent = won;
      var slashSpan = document.createTextNode('/');
      var lostSpan = document.createElement('span');
      lostSpan.style.color = 'var(--red)';
      lostSpan.textContent = lost;
      num.appendChild(wonSpan);
      num.appendChild(slashSpan);
      num.appendChild(lostSpan);
    } else {
      num.textContent = s.num;
      if (s.color) num.style.color = s.color;
    }
    var lbl = document.createElement('div');
    lbl.className = 'stat-label';
    lbl.textContent = s.label;
    card.appendChild(num);
    card.appendChild(lbl);
    grid.appendChild(card);
  });
  app.appendChild(grid);

  // Prices bar
  var prices = arb.prices || {};
  var priceKeys = Object.keys(prices);
  if (priceKeys.length > 0) {
    var prTitle = document.createElement('div');
    prTitle.className = 'section-title';
    prTitle.textContent = 'Live Prices';
    app.appendChild(prTitle);
    var prBar = document.createElement('div');
    prBar.className = 'prices-bar';
    priceKeys.forEach(function(sym) {
      var chip = document.createElement('div');
      chip.className = 'price-chip';
      var symEl = document.createElement('span');
      symEl.className = 'price-sym';
      symEl.style.color = ASSET_COLORS[sym] || 'var(--text-bright)';
      symEl.textContent = sym;
      var valEl = document.createElement('span');
      valEl.className = 'price-val';
      valEl.textContent = (sym === 'DOGE' || sym === 'XRP') ? usd(prices[sym], 4) : usd(prices[sym], 2);
      chip.appendChild(symEl);
      chip.appendChild(valEl);
      prBar.appendChild(chip);
    });
    app.appendChild(prBar);
  }

  // Engine status
  var engTitle = document.createElement('div');
  engTitle.className = 'section-title';
  engTitle.textContent = 'Engine Status';
  app.appendChild(engTitle);
  var engCard = document.createElement('div');
  engCard.className = 'card engine-card';
  var engRow = document.createElement('div');
  engRow.className = 'engine-row';
  var tag = document.createElement('span');
  tag.className = 'engine-tag';
  tag.textContent = version.toUpperCase();
  engRow.appendChild(tag);
  var engStats = [
    {label: 'Signals: ', val: signals},
    {label: 'Skipped (repriced): ', val: skipRepriced},
    {label: 'Ticks: ', val: ticks}
  ];
  engStats.forEach(function(es) {
    var sp = document.createElement('span');
    sp.className = 'engine-stat';
    sp.textContent = es.label;
    var b = document.createElement('strong');
    b.textContent = es.val;
    sp.appendChild(b);
    engRow.appendChild(sp);
  });
  engCard.appendChild(engRow);

  if (arb.period_remaining) {
    var period = parsePeriodRemaining(arb.period_remaining);
    var wrap = document.createElement('div');
    wrap.className = 'period-bar-wrap';
    var plabel = document.createElement('div');
    plabel.className = 'period-label';
    var pl1 = document.createElement('span');
    pl1.textContent = 'Current 15-min Period';
    var pl2 = document.createElement('span');
    pl2.textContent = period.text + ' remaining';
    plabel.appendChild(pl1);
    plabel.appendChild(pl2);
    wrap.appendChild(plabel);
    var pbar = document.createElement('div');
    pbar.className = 'period-bar';
    var pfill = document.createElement('div');
    pfill.className = 'period-fill';
    pfill.style.width = period.pct + '%';
    pbar.appendChild(pfill);
    wrap.appendChild(pbar);
    engCard.appendChild(wrap);
  }
  app.appendChild(engCard);

  // AI Monitor
  if (aiData && aiData.status !== 'none') {
    var aiTitle = document.createElement('div');
    aiTitle.className = 'section-title';
    aiTitle.style.marginTop = '24px';
    aiTitle.textContent = 'AI Health Monitor';
    app.appendChild(aiTitle);
    var aiCard = document.createElement('div');
    aiCard.className = 'card ai-card ai-' + (aiData.status || 'unknown').toLowerCase();
    var aiHeader = document.createElement('div');
    aiHeader.className = 'ai-header';
    var aiLabel = document.createElement('span');
    aiLabel.style.fontWeight = '700';
    aiLabel.style.fontSize = '0.9em';
    aiLabel.style.color = 'var(--text-bright)';
    aiLabel.textContent = 'Claude Analysis';
    var aiBadge = document.createElement('span');
    aiBadge.className = 'ai-badge';
    aiBadge.textContent = aiData.status || 'UNKNOWN';
    aiHeader.appendChild(aiLabel);
    aiHeader.appendChild(aiBadge);
    aiCard.appendChild(aiHeader);
    var aiSummary = document.createElement('div');
    aiSummary.className = 'ai-summary';
    aiSummary.textContent = aiData.summary || 'No verdict available';
    aiCard.appendChild(aiSummary);
    if (aiData.issues && aiData.issues !== 'NONE') {
      var aiIssues = document.createElement('div');
      aiIssues.className = 'ai-issues';
      aiIssues.textContent = aiData.issues;
      aiCard.appendChild(aiIssues);
    }
    if (aiData.timestamp) {
      var aiTime = document.createElement('div');
      aiTime.className = 'ai-time';
      aiTime.textContent = 'Last check: ' + aiData.timestamp;
      aiCard.appendChild(aiTime);
    }
    app.appendChild(aiCard);
  }

  // Recent Trades
  var trTitle = document.createElement('div');
  trTitle.className = 'section-title';
  trTitle.style.marginTop = '24px';
  trTitle.textContent = 'Recent Trades';
  app.appendChild(trTitle);

  var tradesList = (arb.trades || []).slice(-12).reverse();
  if (tradesList.length === 0) {
    var empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'No trades yet';
    app.appendChild(empty);
  } else {
    tradesList.forEach(function(t) {
      var statusCls = t.status === 'won' ? 'side-won' : (t.status === 'lost' ? 'side-lost' : 'side-open');
      var bgColor = ASSET_COLORS[t.asset] || '#6366f1';
      var sideLabel = (t.side || '').replace('buy_', '');
      var moveStr = t.edge ? (String(t.edge).indexOf('%') !== -1 ? t.edge : t.edge + '%') : '--';

      var item = document.createElement('div');
      item.className = 'pos-item';

      var icon = document.createElement('div');
      icon.className = 'pos-icon';
      icon.style.background = bgColor;
      icon.textContent = t.asset || '?';

      var mid = document.createElement('div');
      mid.className = 'pos-mid';
      var name = document.createElement('div');
      name.className = 'pos-name';
      name.textContent = (t.asset || '?') + ' 15-min ' + sideLabel;
      var detail = document.createElement('div');
      detail.className = 'pos-detail';
      detail.textContent = 'Ask ' + usd(t.entry_price, 4) + ' \u00B7 Move ' + moveStr + (t.confidence ? ' \u00B7 ' + t.confidence : '');
      mid.appendChild(name);
      mid.appendChild(detail);

      var right = document.createElement('div');
      right.className = 'pos-right';
      var val = document.createElement('div');
      val.className = 'pos-value';
      val.style.color = t.pnl > 0 ? 'var(--green)' : (t.pnl < 0 ? 'var(--red)' : 'var(--text)');
      val.textContent = t.status === 'open' ? usd(t.size_usd) : ((t.pnl >= 0 ? '+' : '') + usd(t.pnl));
      var sub = document.createElement('div');
      sub.className = 'pos-sub';
      var pill = document.createElement('span');
      pill.className = 'side-pill ' + statusCls;
      pill.textContent = t.status;
      sub.appendChild(pill);
      right.appendChild(val);
      right.appendChild(sub);

      item.appendChild(icon);
      item.appendChild(mid);
      item.appendChild(right);
      app.appendChild(item);
    });
  }
}

setInterval(refresh, 5000);
refresh();
</script>
</body>
</html>
