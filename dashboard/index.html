<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Polymarket Bot</title>
<style>
  :root {
    --bg: #0a0e14; --surface: #10151d; --surface-2: #151c27;
    --border: #1a2332; --border-hover: #263344;
    --text: #b0bfd0; --text-dim: #556680; --text-bright: #e4ecf5;
    --green: #34d399; --green-dim: rgba(52,211,153,0.10);
    --red: #f87171; --red-dim: rgba(248,113,113,0.10);
    --blue: #60a5fa; --blue-dim: rgba(96,165,250,0.10);
    --amber: #fbbf24; --amber-dim: rgba(251,191,36,0.10);
    --purple: #a78bfa; --purple-dim: rgba(167,139,250,0.10);
    --cyan: #22d3ee;
    --radius: 14px; --radius-sm: 8px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    padding: 20px; -webkit-font-smoothing: antialiased;
    min-height: 100vh; max-width: 800px; margin: 0 auto;
  }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0 20px;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, #a78bfa 0%, #22d3ee 100%);
    display: grid; place-items: center;
    font-size: 16px; font-weight: 800; color: #fff;
  }
  .header h1 { font-size: 1.1em; font-weight: 700; color: var(--text-bright); }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--green);
    animation: blink 2.5s ease-in-out infinite;
  }
  .status-dot.error { background: var(--red); animation: none; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
  .hero { text-align: center; padding: 16px 0 24px; }
  .hero-label { font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); margin-bottom: 4px; }
  .hero-value { font-size: 2.8em; font-weight: 800; color: var(--text-bright); letter-spacing: -0.04em; }
  .hero-sub { display: flex; justify-content: center; gap: 20px; margin-top: 10px; font-size: 0.82em; flex-wrap: wrap; }
  .hero-sub span { color: var(--text-dim); }
  .pos { color: var(--green) !important; }
  .neg { color: var(--red) !important; }
  .section { margin-bottom: 20px; }
  .section-title { font-size: 0.68em; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
  .kv { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
  .kv + .kv { border-top: 1px solid var(--border); }
  .kv-label { color: var(--text-dim); font-size: 0.82em; }
  .kv-val { font-weight: 600; font-size: 0.85em; color: var(--text-bright); }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card { text-align: center; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 8px; }
  .stat-num { font-size: 1.6em; font-weight: 800; color: var(--text-bright); }
  .stat-label { font-size: 0.68em; color: var(--text-dim); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.05em; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 0.68em; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
  .badge-green { background: var(--green-dim); color: var(--green); }
  .badge-red { background: var(--red-dim); color: var(--red); }
  .badge-blue { background: var(--blue-dim); color: var(--blue); }
  .badge-amber { background: var(--amber-dim); color: var(--amber); }
  .badge-purple { background: var(--purple-dim); color: var(--purple); }
  .pos-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 6px; font-size: 0.85em; }
  .pos-left { flex: 1; min-width: 0; }
  .pos-name { font-weight: 600; color: var(--text-bright); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pos-detail { font-size: 0.8em; color: var(--text-dim); margin-top: 2px; }
  .pos-right { text-align: right; margin-left: 12px; }
  .pos-value { font-weight: 700; font-size: 0.95em; }
  .ai-card { padding: 14px 16px; }
  .ai-card.ok { border-color: rgba(52,211,153,0.25); }
  .ai-card.warning { border-color: rgba(251,191,36,0.3); background: var(--amber-dim); }
  .ai-card.critical { border-color: rgba(248,113,113,0.3); background: var(--red-dim); }
  .ai-summary { font-size: 0.82em; color: var(--text); line-height: 1.5; margin-top: 6px; }
  .ai-time { font-size: 0.7em; color: var(--text-dim); margin-top: 4px; }
  .btc-price { font-size: 1.3em; font-weight: 700; color: #f7931a; text-align: center; margin: 10px 0; }
  .footer { padding: 14px 0 8px; font-size: 0.68em; color: var(--text-dim); text-align: center; }
  .empty { text-align: center; padding: 24px; color: var(--text-dim); font-size: 0.85em; }
  @media (max-width: 640px) { body { padding: 14px; } .hero-value { font-size: 2em; } .grid-3 { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>
<div class="header">
  <div class="header-left"><div class="logo">P</div><h1>Polymarket Bot</h1></div>
  <div style="display:flex;align-items:center;gap:8px">
    <div id="dot" class="status-dot"></div>
    <span class="badge badge-green">LIVE</span>
  </div>
</div>
<div id="app"><div class="empty">Connecting...</div></div>
<div class="footer" id="footer">--</div>
<script>
const API = window.location.origin;
let D = null;
function usd(n) { return '$' + Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

async function refresh() {
  try {
    const r = await fetch(API + '/api/all-status');
    D = await r.json();
    render();
    document.getElementById('dot').className = 'status-dot';
  } catch(e) {
    document.getElementById('dot').className = 'status-dot error';
  }
  document.getElementById('footer').textContent = 'Updated ' + new Date().toLocaleTimeString();
}

function render() {
  if (!D) return;
  const c = D.contrarian || {};
  const pt = D.power_trader || {};
  const ai = D.ai_monitor || {};
  const positions = pt.positions || [];
  const pnl = c.pnl || 0;
  const btcStr = c.btc ? '$' + Number(c.btc).toLocaleString('en-US', {maximumFractionDigits:0}) : '--';
  const trades = (c.wins||0) + (c.losses||0);
  const pending = c.pending ? '<span class="badge badge-amber">SIGNAL PENDING</span>' : '<span class="badge badge-blue">WATCHING</span>';
  const elapsed = parseInt(c.period_elapsed) || 0;
  const pct = Math.min(100, (elapsed / 900) * 100);
  const rem = Math.max(0, 900 - elapsed);
  const remM = Math.floor(rem / 60);
  const remS = rem % 60;

  let posHtml = '';
  for (const p of positions) {
    const profit = (p.tokens * 0.90) - p.size;
    posHtml += '<div class="pos-item"><div class="pos-left"><div class="pos-name">' +
      (p.question||'').substring(0,45) + '</div><div class="pos-detail">' +
      p.side + ' @ $' + (p.price||0).toFixed(3) + ' | ' + (p.tokens||0).toFixed(0) +
      ' tokens</div></div><div class="pos-right"><div class="pos-value pos">+$' +
      profit.toFixed(2) + '</div><div class="pos-detail">if wins</div></div></div>';
  }
  if (!positions.length) posHtml = '<div class="empty">No positions</div>';

  let tradeHtml = '';
  for (const t of (c.recent_trades||[]).slice(-5)) {
    if (t.side && (t.entry || t.pnl)) {
      const st = t.status === 'won' ? 'badge-green' : t.status === 'lost' ? 'badge-red' : 'badge-blue';
      const label = t.status || 'placed';
      tradeHtml += '<div class="pos-item"><div class="pos-left"><div class="pos-name">' +
        (t.side||'') + (t.entry ? ' @ ' + t.entry : '') + '</div><div class="pos-detail">' +
        (t.trigger || ('P&L: ' + (t.pnl||''))) + '</div></div><div class="pos-right">' +
        '<span class="badge ' + st + '">' + label + '</span></div></div>';
    }
  }

  let signalHtml = '';
  for (const s of (c.recent_signals||[]).slice(-3)) {
    signalHtml += '<div class="pos-item"><div class="pos-left"><div class="pos-name">BTC moved ' +
      (s.move||'?') + '</div><div class="pos-detail">Fade: ' + (s.fade||'?') +
      '</div></div><div class="pos-right"><span class="badge badge-amber">SIGNAL</span></div></div>';
  }

  const aiSt = (ai.status||'none').toLowerCase();
  const aiCls = aiSt === 'ok' ? 'ok' : aiSt === 'warning' ? 'warning' : aiSt === 'critical' ? 'critical' : '';
  const aiBadge = aiSt === 'ok' ? 'badge-green' : aiSt === 'warning' ? 'badge-amber' : 'badge-red';

  document.getElementById('app').innerHTML =
    '<div class="hero"><div class="hero-label">CONTRARIAN BOT BANKROLL</div>' +
    '<div class="hero-value">' + usd(c.bankroll) + '</div>' +
    '<div class="hero-sub"><span>P&L <strong class="' + (pnl>=0?'pos':'neg') + '">' + (pnl>=0?'+':'') + usd(pnl) + '</strong></span>' +
    '<span>Win Rate <strong>' + (c.win_rate||'--') + '</strong></span>' +
    '<span>Trades <strong>' + trades + '</strong></span></div></div>' +
    '<div class="btc-price">BTC ' + btcStr + '</div>' +
    '<div class="grid-3"><div class="stat-card"><div class="stat-num">' + (c.wins||0) + '</div><div class="stat-label">Wins</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + (c.losses||0) + '</div><div class="stat-label">Losses</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + (c.open||0) + '</div><div class="stat-label">Open</div></div></div>' +
    '<div class="section"><div class="section-title">Contrarian Engine</div><div class="card">' +
    '<div class="kv"><span class="kv-label">Strategy</span><span class="kv-val">Fade BTC moves &gt; 0.5%</span></div>' +
    '<div class="kv"><span class="kv-label">Status</span><span class="kv-val">' + pending + '</span></div>' +
    '<div class="kv"><span class="kv-label">Period</span><span class="kv-val">' + remM + 'm ' + remS + 's left</span></div>' +
    '<div style="margin-top:8px;height:6px;border-radius:3px;background:var(--surface-2);overflow:hidden">' +
    '<div style="height:100%;width:' + pct + '%;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:3px;transition:width 1s"></div></div></div></div>' +
    (signalHtml ? '<div class="section"><div class="section-title">Recent Signals</div>' + signalHtml + '</div>' : '') +
    (tradeHtml ? '<div class="section"><div class="section-title">Recent Trades</div>' + tradeHtml + '</div>' : '') +
    '<div class="section"><div class="section-title">Power Trader Positions (' + positions.length + ')</div>' + posHtml +
    (positions.length ? '<div style="text-align:right;font-size:0.75em;color:var(--text-dim);padding:4px">Invested: ' + usd(pt.total_invested) + ' | Resolves: July 31</div>' : '') + '</div>' +
    (ai.status && ai.status !== 'none' ? '<div class="section"><div class="section-title">Claude Analysis</div>' +
    '<div class="card ai-card ' + aiCls + '"><div style="display:flex;justify-content:space-between;align-items:center">' +
    '<span style="font-weight:700;font-size:0.85em;color:var(--text-bright)">Health Check</span>' +
    '<span class="badge ' + aiBadge + '">' + (ai.status||'') + '</span></div>' +
    '<div class="ai-summary">' + (ai.summary||'') + '</div>' +
    (ai.issues && ai.issues !== 'NONE' ? '<div style="font-size:0.75em;color:var(--amber);margin-top:4px">' + ai.issues + '</div>' : '') +
    '<div class="ai-time">' + (ai.timestamp||'') + '</div></div></div>' : '');
}

setInterval(refresh, 5000);
refresh();
</script>
</body>
</html>
